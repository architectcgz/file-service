server:
  port: 8090

spring:
  application:
    name: file-gateway-service

gateway:
  upstream:
    base-url: ${FILE_SERVICE_BASE_URL:http://localhost:8089}
    connect-timeout: ${FILE_GATEWAY_CONNECT_TIMEOUT:3s}
    read-timeout: ${FILE_GATEWAY_READ_TIMEOUT:5s}
  auth:
    allow-header-identity: ${FILE_GATEWAY_ALLOW_HEADER_IDENTITY:true}
    signing-secret: ${FILE_GATEWAY_SIGNING_SECRET:change-me-before-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
