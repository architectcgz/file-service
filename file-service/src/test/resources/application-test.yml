# 测试环境配置
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  # Redis 配置（默认对接本地共享 Redis，个别测试可用 DynamicPropertySource 覆盖）
  data:
    redis:
      password: ${REDIS_PASSWORD:redis123456}

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.architectcgz.file.infrastructure.mybatis
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置 - 调试 MyBatis
logging:
  level:
    org.mybatis: DEBUG
