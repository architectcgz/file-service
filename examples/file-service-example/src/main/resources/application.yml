spring:
  application:
    name: file-service-example

server:
  port: 8091

# File Service Client 配置
file-service:
  client:
    # File Service 服务器地址
    server-url: http://localhost:8089
    
    # 租户 ID（应用标识）
    tenant-id: example-app
    
    # 认证令牌（可以从环境变量读取）
    token: ${FILE_SERVICE_TOKEN:your-jwt-token-here}
    
    # 自定义域名（可选）
    # custom-domain: https://files.example.com
    
    # CDN 域名（可选，用于公共文件）
    # cdn-domain: https://cdn.example.com
    
    # 连接超时（毫秒）
    connect-timeout: 10000
    
    # 读取超时（毫秒）
    read-timeout: 30000
    
    # 最大连接数
    max-connections: 50
    
    # 重试次数
    max-retries: 3
    
    # 重试延迟（毫秒）
    retry-delay-ms: 1000

# 日志配置
logging:
  level:
    com.platform.fileservice.client: DEBUG
    com.platform.example: INFO
