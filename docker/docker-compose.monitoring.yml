# =====================================================
# File Service Monitoring Stack
# =====================================================
# Services: Prometheus, Grafana
# Purpose: Monitor Bitmap optimization metrics
# =====================================================

services:
  # =====================================================
  # Prometheus - Metrics Collection
  # =====================================================
  file-service-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: file-service-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - shared-infra
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # =====================================================
  # Grafana - Monitoring Dashboard
  # =====================================================
  file-service-grafana:
    image: grafana/grafana:10.2.2
    container_name: file-service-grafana
    environment:
      - TZ=Asia/Shanghai
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123456}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3100
      - GF_INSTALL_PLUGINS=
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    ports:
      - "3100:3000"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - shared-infra
    depends_on:
      file-service-prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

# =====================================================
# Networks
# =====================================================
networks:
  shared-infra:
    external: true

# =====================================================
# Volumes
# =====================================================
volumes:
  prometheus_data:
    name: file_service_prometheus_data
  grafana_data:
    name: file_service_grafana_data
