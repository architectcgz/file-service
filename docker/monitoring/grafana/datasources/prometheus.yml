# Grafana 数据源配置
# 自动配置 Prometheus 作为数据源

apiVersion: 1

# 数据源列表
datasources:
  # Prometheus 数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    
    # JSON 数据配置
    jsonData:
      # 时间间隔 - 与 Prometheus 抓取间隔一致
      timeInterval: "15s"
      
      # 查询超时
      queryTimeout: "60s"
      
      # HTTP 方法
      httpMethod: POST
      
      # 自定义查询参数
      customQueryParameters: ""
      
      # 启用 Exemplars (示例数据)
      exemplarTraceIdDestinations: []
    
    # 版本
    version: 1
    
    # 只读模式
    readOnly: false
    
    # 组织 ID
    orgId: 1
    
    # 基本认证 (如果 Prometheus 需要认证)
    # basicAuth: false
    # basicAuthUser: ""
    # secureJsonData:
    #   basicAuthPassword: ""
    
    # 其他选项
    withCredentials: false
    
    # UID - 用于在仪表板中引用此数据源
    uid: prometheus-file-service
