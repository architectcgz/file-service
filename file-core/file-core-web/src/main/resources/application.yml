spring:
  application:
    name: file-core-web

file:
  core:
    access:
      gateway-base-url: ${FILE_CORE_GATEWAY_BASE_URL:http://localhost:8090}
      ticket-ttl: ${FILE_CORE_ACCESS_TICKET_TTL:5m}
      signing-secret: ${FILE_GATEWAY_SIGNING_SECRET:change-me-before-production}
    upload:
      session-ttl: ${FILE_CORE_UPLOAD_SESSION_TTL:24h}
    storage:
      s3:
        endpoint: ${S3_ENDPOINT:http://localhost:9000}
        public-endpoint: ${S3_PUBLIC_ENDPOINT:http://localhost:9000}
        access-key: ${S3_ACCESS_KEY:minioadmin}
        secret-key: ${S3_SECRET_KEY:minioadmin}
        bucket: ${S3_BUCKET:files}
        public-bucket: ${S3_PUBLIC_BUCKET:files-public}
        private-bucket: ${S3_PRIVATE_BUCKET:files-private}
        region: ${S3_REGION:us-east-1}
        cdn-domain: ${S3_CDN_DOMAIN:}
        path-style-access: ${S3_PATH_STYLE_ACCESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
